name: ci

# Runs on the self-hosted runner. Builds all 5 images (shares Docker's cache),
# then validates each with ephemeral `docker run` checks — no `compose up`, so
# it never collides with a locally-running stack (fixed container names/ports).
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: [self-hosted, windows, x64]
    steps:
      - uses: actions/checkout@v5

      - name: Build all images (Compose Bake)
        env:
          COMPOSE_BAKE: "true"
        run: docker compose --profile all build

      - name: Backend — Django check + tests (SQLite, no DB)
        run: docker run --rm squidfall/backend:latest sh -c "python manage.py check && python manage.py test --noinput 2>&1"

      - name: Tools — image import check
        run: docker run --rm squidfall/tools:latest python -c "import fastmcp; print('tools image OK')"

      - name: Tools — weather providers (offline static)
        run: docker run --rm -e GEOCODER_PROVIDER=static -e "GEOCODER_STATIC_DEFAULT=40.44,-79.99" -e FORECAST_PROVIDER=static -e FORECAST_STATIC_TEXT=offline-ok squidfall/tools:latest python -c "import asyncio; from squidfall.providers import geocode, forecast; print(asyncio.run(geocode('x')), '|', asyncio.run(forecast(1.0, 2.0)))"

      - name: Inference — dependency import check
        run: docker run --rm squidfall/inference:latest python -c "import langgraph, langchain_ollama, ag_ui_langgraph, langchain_mcp_adapters; print('inference deps OK')"

      - name: Inference — LLM provider factory (offline construction, all 3 providers)
        run: |
          docker run --rm -e LLM_PROVIDER=ollama squidfall/inference:latest python -c "from squidfall.llm import build_llm; print('ollama ->', type(build_llm()).__name__)"
          docker run --rm -e LLM_PROVIDER=openai -e OPENAI_BASE_URL=http://x/v1 -e OPENAI_API_KEY=x -e LLM_MODEL=gpt-4o-mini squidfall/inference:latest python -c "from squidfall.llm import build_llm; print('openai ->', type(build_llm()).__name__)"
          docker run --rm -e LLM_PROVIDER=azure_openai -e AZURE_OPENAI_ENDPOINT=https://x.openai.azure.com/ -e AZURE_OPENAI_DEPLOYMENT=d -e AZURE_OPENAI_API_KEY=x squidfall/inference:latest python -c "from squidfall.llm import build_llm; print('azure ->', type(build_llm()).__name__)"

      - name: Lint — ruff (critical rules)
        run: docker run --rm -v "${{ github.workspace }}:/src" -w /src ghcr.io/astral-sh/ruff:latest check --select E9,F63,F7,F82 backend tools inference

      - name: Security scan — Trivy (fail on FIXABLE HIGH/CRITICAL)
        run: |
          docker save squidfall/backend:latest -o backend.tar
          docker save squidfall/inference:latest -o inference.tar
          docker run --rm -v "${{ github.workspace }}:/work" aquasec/trivy:latest image --input /work/backend.tar --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress
          docker run --rm -v "${{ github.workspace }}:/work" aquasec/trivy:latest image --input /work/inference.tar --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress
          Remove-Item backend.tar, inference.tar
