name: hello-self-hosted

# Phase 2 smoke test: proves the self-hosted runner picks up jobs and can
# reach the local Docker daemon (which the CI pipeline in Phase 3 will need).
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  hello:
    runs-on: [self-hosted, windows, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Greet
        run: echo "Hello from the Squidfall self-hosted runner"

      - name: Toolchain check
        run: |
          docker --version
          docker compose version
